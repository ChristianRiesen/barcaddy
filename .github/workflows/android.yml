name: Android CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      IS_RELEASE: ${{ startsWith(github.ref, 'refs/tags/v') }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-35 build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        if: env.IS_RELEASE == 'false'
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload debug APK
        if: env.IS_RELEASE == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: barcaddy-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Decode keystore
        if: env.IS_RELEASE == 'true'
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/upload.jks"

      - name: Create keystore.properties
        if: env.IS_RELEASE == 'true'
        run: |
          cat > keystore.properties <<EOF
          storeFile=$RUNNER_TEMP/upload.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Build release bundle
        if: env.IS_RELEASE == 'true'
        run: ./gradlew bundleRelease --no-daemon --stacktrace

      - name: Upload release bundle
        if: env.IS_RELEASE == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: barcaddy-release-${{ github.ref_name }}-aab
          path: app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
